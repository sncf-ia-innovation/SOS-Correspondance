<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sticky desktop — preview</title>
  <link rel="stylesheet" href="../../dist/tokens.css">
  <link rel="stylesheet" href="sticky-desktop.css">
  <style>
    body {
      margin: 0;
      padding: var(--space-32);
      background: var(--color-gray-94);
      color: var(--color-gray-20);
      font-family: var(--font-sans);
    }
    h1 { font-size: var(--text-2xl); margin: 0 0 var(--space-24); }
  </style>
</head>
<body>
  <h1>Sticky desktop</h1>

  <aside class="ds-sticky" role="region" aria-label="Sélection en cours">
    <p class="ds-sticky__label">1 trajet sélectionné</p>
    <button type="button" class="ds-sticky__action">
      Valider ce trajet
      <svg class="ds-sticky__icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
        <path d="M5 3h8v8h-2V6.4L4.7 12.7 3.3 11.3 9.6 5H5V3Z"/>
      </svg>
    </button>
  </aside>
</body>
</html>
