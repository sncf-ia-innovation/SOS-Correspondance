<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vignette train — preview</title>
  <link rel="stylesheet" href="../../dist/tokens.css">
  <link rel="stylesheet" href="vignette-train.css">
  <style>
    body { margin: 0; padding: 40px; background: #f7f7f7; font-family: 'Avenir', system-ui, sans-serif; }
    h1 { font-size: 20px; }
    .row { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
    .case { display: flex; flex-direction: column; gap: 8px; }
    .case figcaption { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <h1>Vignette train</h1>
  <div class="row">

    <figure class="case">
      <article class="ds-vignette-train">
        <div class="ds-vignette-train__body">
          <header class="ds-vignette-train__header">
            <p class="ds-vignette-train__reference">Référence RORVVB</p>
            <span class="ds-vignette-train__checkbox" role="checkbox" aria-checked="false" aria-label="Sélectionner ce train"></span>
          </header>
          <div class="ds-vignette-train__journey"></div>
          <p class="ds-vignette-train__passengers">
            <span class="ds-vignette-train__passengers-icon" aria-hidden="true"></span>
            <span class="ds-vignette-train__passengers-label">2 Passagers</span>
          </p>
        </div>
        <p class="ds-vignette-train__badge">
          <svg class="ds-vignette-train__badge-icon" viewBox="0 0 16 16" aria-hidden="true">
            <use href="../../dist/icons.sprite.svg#suppression"></use>
          </svg>
          <span class="ds-vignette-train__badge-label">Train supprimé</span>
        </p>
      </article>
      <figcaption>Default</figcaption>
    </figure>

    <figure class="case">
      <article class="ds-vignette-train ds-vignette-train--selected">
        <div class="ds-vignette-train__body">
          <header class="ds-vignette-train__header">
            <p class="ds-vignette-train__reference">Référence RORVVB</p>
            <span class="ds-vignette-train__checkbox" role="checkbox" aria-checked="true" aria-label="Sélectionner ce train"></span>
          </header>
          <div class="ds-vignette-train__journey"></div>
          <p class="ds-vignette-train__passengers">
            <span class="ds-vignette-train__passengers-icon" aria-hidden="true"></span>
            <span class="ds-vignette-train__passengers-label">2 Passagers</span>
          </p>
        </div>
        <p class="ds-vignette-train__badge">
          <svg class="ds-vignette-train__badge-icon" viewBox="0 0 16 16" aria-hidden="true">
            <use href="../../dist/icons.sprite.svg#suppression"></use>
          </svg>
          <span class="ds-vignette-train__badge-label">Train supprimé</span>
        </p>
      </article>
      <figcaption>Sélectionné</figcaption>
    </figure>

    <figure class="case">
      <article class="ds-vignette-train ds-vignette-train--hover">
        <div class="ds-vignette-train__body">
          <header class="ds-vignette-train__header">
            <p class="ds-vignette-train__reference">Référence RORVVB</p>
            <span class="ds-vignette-train__checkbox" role="checkbox" aria-checked="false" aria-label="Sélectionner ce train"></span>
          </header>
          <div class="ds-vignette-train__journey"></div>
          <p class="ds-vignette-train__passengers">
            <span class="ds-vignette-train__passengers-icon" aria-hidden="true"></span>
            <span class="ds-vignette-train__passengers-label">2 Passagers</span>
          </p>
        </div>
        <p class="ds-vignette-train__badge">
          <svg class="ds-vignette-train__badge-icon" viewBox="0 0 16 16" aria-hidden="true">
            <use href="../../dist/icons.sprite.svg#suppression"></use>
          </svg>
          <span class="ds-vignette-train__badge-label">Train supprimé</span>
        </p>
      </article>
      <figcaption>Survol</figcaption>
    </figure>

  </div>
</body>
</html>
