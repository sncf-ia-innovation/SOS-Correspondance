<table class="ds-ligne-tableau">
  <thead>
    <tr class="ds-ligne-tableau__row ds-ligne-tableau__row--entete">
      <th class="ds-ligne-tableau__cell ds-ligne-tableau__cell--handle" scope="col"></th>
      <th class="ds-ligne-tableau__cell" scope="col">Nom</th>
      <th class="ds-ligne-tableau__cell" scope="col">Transporteurs</th>
      <th class="ds-ligne-tableau__cell" scope="col">Statut</th>
      <th class="ds-ligne-tableau__cell" scope="col">Dernière modification</th>
    </tr>
  </thead>
  <tbody>
    <tr class="ds-ligne-tableau__row ds-ligne-tableau__row--claire">
      <td class="ds-ligne-tableau__cell ds-ligne-tableau__cell--handle">
        <span class="ds-ligne-tableau__drag" aria-label="Déplacer la ligne" role="button" tabindex="0">
          <svg class="ds-ligne-tableau__drag-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <circle cx="6" cy="3" r="1.3"/><circle cx="10" cy="3" r="1.3"/>
            <circle cx="6" cy="8" r="1.3"/><circle cx="10" cy="8" r="1.3"/>
            <circle cx="6" cy="13" r="1.3"/><circle cx="10" cy="13" r="1.3"/>
          </svg>
        </span>
      </td>
      <td class="ds-ligne-tableau__cell">Libellé</td>
      <td class="ds-ligne-tableau__cell">Libellé</td>
      <td class="ds-ligne-tableau__cell">
        <span class="ds-ligne-tableau__statut ds-ligne-tableau__statut--vert">
          <span class="ds-ligne-tableau__statut-dot" aria-hidden="true"></span>
          <span class="ds-ligne-tableau__statut-label">En ligne</span>
        </span>
      </td>
      <td class="ds-ligne-tableau__cell">Libellé</td>
    </tr>
    <tr class="ds-ligne-tableau__row ds-ligne-tableau__row--foncee">
      <td class="ds-ligne-tableau__cell ds-ligne-tableau__cell--handle">
        <span class="ds-ligne-tableau__drag" aria-label="Déplacer la ligne" role="button" tabindex="0">
          <svg class="ds-ligne-tableau__drag-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
            <circle cx="6" cy="3" r="1.3"/><circle cx="10" cy="3" r="1.3"/>
            <circle cx="6" cy="8" r="1.3"/><circle cx="10" cy="8" r="1.3"/>
            <circle cx="6" cy="13" r="1.3"/><circle cx="10" cy="13" r="1.3"/>
          </svg>
        </span>
      </td>
      <td class="ds-ligne-tableau__cell">Libellé</td>
      <td class="ds-ligne-tableau__cell">Libellé</td>
      <td class="ds-ligne-tableau__cell">
        <span class="ds-ligne-tableau__statut ds-ligne-tableau__statut--safran">
          <span class="ds-ligne-tableau__statut-dot" aria-hidden="true"></span>
          <span class="ds-ligne-tableau__statut-label">Brouillon</span>
        </span>
      </td>
      <td class="ds-ligne-tableau__cell">Libellé</td>
    </tr>
  </tbody>
</table>
