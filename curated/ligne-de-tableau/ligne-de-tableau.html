<script>
/*
 * SOS Correspondance — surcouche mot de passe ("gate")
 * ----------------------------------------------------
 * Injectée dans chaque page au moment du déploiement (voir scripts/inject-gate.mjs).
 * NE PAS considérer comme une vraie sécurité : le HTML est livré au navigateur,
 * un utilisateur averti peut contourner (view-source, JS désactivé). C'est un
 * voile de confidentialité "assez fort" pour des prototypes internes.
 *
 * Le mot de passe n'apparaît jamais en clair : seul son SHA-256 est embarqué
 * (window.__SOS_GATE_SHA256__, injecté depuis un secret GitHub au déploiement).
 * Sans hash configuré → la gate ne fait rien (dev local en file:// non gêné).
 *
 * Deux niveaux d'accès :
 *  - mot de passe « complet »  (secret SOS_GATE_SHA256)        → toutes les pages ;
 *  - mot de passe « client »   (secret SOS_GATE_CLIENT_SHA256) → UNIQUEMENT les pages
 *    du parcours formulaire client (client/form/messages), marquées par
 *    window.__SOS_GATE_SCOPE__ === "client" à l'injection (étude externe Unguess).
 *    Sur les autres pages, ce hash n'est pas accepté → la gate se réaffiche.
 */
(function () {
  var HASH = (window.__SOS_GATE_SHA256__ || "").toLowerCase().trim();
  var CLIENT_HASH = (window.__SOS_GATE_CLIENT_SHA256__ || "").toLowerCase().trim();
  var ACCEPTED = []; // hashs valables sur CETTE page
  if (HASH) ACCEPTED.push(HASH);
  if (CLIENT_HASH && window.__SOS_GATE_SCOPE__ === "client") ACCEPTED.push(CLIENT_HASH);
  if (!ACCEPTED.length) return; // pas de hash → pas de gate (ex. dev local)

  var KEY = "sos-gate-ok";
  try {
    // déjà déverrouillé cette session, avec un hash valable sur cette page
    if (ACCEPTED.indexOf(sessionStorage.getItem(KEY)) !== -1) return;
  } catch (e) {}

  // Masque le contenu de la page tant que la gate n'est pas passée (anti-flash).
  var root = document.documentElement;
  root.classList.add("sos-gate-pending");
  var style = document.createElement("style");
  style.textContent =
    "html.sos-gate-pending>body{display:none!important}" +
    ".sos-gate-scrim{position:fixed;inset:0;z-index:2147483647;display:grid;place-items:center;" +
    "padding:24px;background:radial-gradient(120% 120% at 50% 0%,#0a3b38 0%,#002b28 55%,#001513 100%);" +
    "font-family:'Avenir','Avenir Next',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}" +
    ".sos-gate-card{width:100%;max-width:380px;background:#fff;border-radius:16px;padding:32px 28px 28px;" +
    "box-shadow:0 24px 60px -12px rgba(0,20,18,.55)}" +
    ".sos-gate-lock{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;margin-bottom:18px;" +
    "background:#e3f3ef;color:#065654}" +
    ".sos-gate-lock svg{width:22px;height:22px}" +
    ".sos-gate-title{margin:0 0 4px;font-size:18px;font-weight:700;color:#002b28;letter-spacing:-.01em}" +
    ".sos-gate-sub{margin:0 0 20px;font-size:13.5px;line-height:1.45;color:#4d4f53}" +
    ".sos-gate-field{position:relative}" +
    ".sos-gate-input{width:100%;box-sizing:border-box;height:46px;padding:0 14px;font-size:15px;" +
    "border:1.5px solid #cddddd;border-radius:10px;color:#002b28;background:#f7fbfa;transition:border-color .15s,box-shadow .15s;outline:none}" +
    ".sos-gate-input:focus{border-color:#065654;box-shadow:0 0 0 4px rgba(6,86,84,.15)}" +
    ".sos-gate-input.err{border-color:#9b2743;box-shadow:0 0 0 4px rgba(155,39,67,.14)}" +
    ".sos-gate-btn{margin-top:14px;width:100%;height:46px;border:0;border-radius:10px;cursor:pointer;" +
    "font-size:15px;font-weight:650;color:#fff;background:#065654;transition:background .15s,transform .05s}" +
    ".sos-gate-btn:hover{background:#054a48}.sos-gate-btn:active{transform:translateY(1px)}" +
    ".sos-gate-err{margin:12px 2px 0;min-height:16px;font-size:12.5px;color:#9b2743;opacity:0;transition:opacity .15s}" +
    ".sos-gate-err.show{opacity:1}" +
    ".sos-gate-hint{margin:16px 2px 0;font-size:11.5px;line-height:1.4;color:#747678}";
  (document.head || root).appendChild(style);

  function sha256hex(str) {
    var enc = new TextEncoder().encode(str);
    if (!window.crypto || !crypto.subtle) return Promise.reject(new Error("no-subtle"));
    return crypto.subtle.digest("SHA-256", enc).then(function (buf) {
      var b = new Uint8Array(buf), h = "";
      for (var i = 0; i < b.length; i++) h += b[i].toString(16).padStart(2, "0");
      return h;
    });
  }

  function build() {
    var scrim = document.createElement("div");
    scrim.className = "sos-gate-scrim";
    scrim.setAttribute("role", "dialog");
    scrim.setAttribute("aria-modal", "true");
    scrim.setAttribute("aria-label", "Accès protégé");
    scrim.innerHTML =
      '<div class="sos-gate-card">' +
      '<div class="sos-gate-lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>' +
      '<h1 class="sos-gate-title">Accès protégé</h1>' +
      '<p class="sos-gate-sub">Cette application est réservée. Collez le mot de passe fourni pour continuer.</p>' +
      '<div class="sos-gate-field">' +
      '<input class="sos-gate-input" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Mot de passe" aria-label="Mot de passe" />' +
      "</div>" +
      '<button class="sos-gate-btn" type="button">Déverrouiller</button>' +
      '<div class="sos-gate-err" aria-live="polite"></div>' +
      '<p class="sos-gate-hint">Mot de passe long — à copier-coller.</p>' +
      "</div>";
    // Appendre à <html> (hors <body>) : le body est masqué tant que la gate est active.
    root.appendChild(scrim);

    var input = scrim.querySelector(".sos-gate-input");
    var btn = scrim.querySelector(".sos-gate-btn");
    var err = scrim.querySelector(".sos-gate-err");
    input.focus();

    function fail(msg) {
      input.classList.add("err");
      err.textContent = msg || "Mot de passe incorrect.";
      err.classList.add("show");
      input.select();
    }

    function submit() {
      var val = input.value || "";
      if (!val) return fail("Saisissez le mot de passe.");
      sha256hex(val).then(function (h) {
        if (ACCEPTED.indexOf(h) !== -1) {
          try { sessionStorage.setItem(KEY, h); } catch (e) {}
          scrim.remove();
          root.classList.remove("sos-gate-pending");
        } else {
          fail();
        }
      }).catch(function () {
        fail("Environnement non sécurisé (HTTPS requis).");
      });
    }

    btn.addEventListener("click", submit);
    input.addEventListener("keydown", function (e) { if (e.key === "Enter") submit(); });
    input.addEventListener("input", function () { input.classList.remove("err"); err.classList.remove("show"); });
  }

  if (document.body) build();
  else document.addEventListener("DOMContentLoaded", build);
})();

</script>
