<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suggestion liste — preview</title>
  <link rel="stylesheet" href="../../dist/tokens.css">
  <link rel="stylesheet" href="suggestion-liste.css">
  <style>
    body {
      margin: 0;
      padding: var(--space-32);
      background: var(--color-gray-97);
      font-family: var(--font-sans);
    }
    .preview-panel {
      max-width: 480px;
      background: var(--color-white);
      padding: var(--space-8);
      border-radius: var(--radius-r6);
    }
  </style>
</head>
<body>
  <div class="preview-panel">
    <ul class="ds-suggestion-liste" role="listbox" aria-label="Suggestions de gares">
      <li class="ds-suggestion-liste__item" role="option" tabindex="0" aria-selected="false">
        <span class="ds-suggestion-liste__label">Marseille Saint Charles</span>
        <span class="ds-suggestion-liste__detail">(Provence-Alpes-Côte d’Azur)</span>
      </li>
      <li class="ds-suggestion-liste__item ds-suggestion-liste__item--selected" role="option" tabindex="0" aria-selected="true">
        <span class="ds-suggestion-liste__label">Marseille Blancarde</span>
        <span class="ds-suggestion-liste__detail">(Provence-Alpes-Côte d’Azur)</span>
      </li>
      <li class="ds-suggestion-liste__item" role="option" tabindex="0" aria-selected="false">
        <span class="ds-suggestion-liste__label">Paris Gare de Lyon</span>
        <span class="ds-suggestion-liste__detail">(Île-de-France)</span>
      </li>
      <li class="ds-suggestion-liste__item" role="option" tabindex="0" aria-selected="false">
        <span class="ds-suggestion-liste__label">Lyon Part-Dieu</span>
        <span class="ds-suggestion-liste__detail">(Auvergne-Rhône-Alpes)</span>
      </li>
    </ul>
  </div>
</body>
</html>
