name: Deploy to AWS (S3 + CloudFront)

# Standard CI/CD SOS Correspondance : chaque push sur main déploie le site
# statique sur AWS S3, injecte la surcouche mot de passe, puis invalide le
# cache CloudFront. Voir DEPLOYMENT.md pour les secrets requis.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-aws
  cancel-in-progress: true

permissions:
  contents: read
  # id-token: write   # ← décommenter pour l'auth AWS par OIDC (recommandé, voir DEPLOYMENT.md)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Injecter la surcouche mot de passe
        env:
          SOS_GATE_SHA256: ${{ secrets.SOS_GATE_SHA256 }}
          SOS_GATE_CLIENT_SHA256: ${{ secrets.SOS_GATE_CLIENT_SHA256 }}   # mdp « client » (parcours formulaire seul — étude Unguess)
        run: node scripts/inject-gate.mjs

      # --- Auth AWS : par clés IAM (défaut). Pour OIDC, voir DEPLOYMENT.md. ---
      - name: Configurer les identifiants AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # OIDC (recommandé) : commenter les 2 lignes ci-dessus, décommenter :
          # role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Synchroniser vers S3
        run: |
          aws s3 sync . "s3://${{ secrets.S3_BUCKET }}" \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "scripts/*" \
            --exclude "deploy/*" \
            --exclude "node_modules/*" \
            --exclude "*.md" \
            --exclude ".gitignore"

      - name: Invalider le cache CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

      - name: Récapitulatif
        run: echo "✅ Déployé. URL → voir le domaine CloudFront (DEPLOYMENT.md)."
