name: Publish to GitHub Pages (branche gh-pages)

# Auto-déploiement : chaque push sur main reconstruit le site (avec la surcouche
# mot de passe injectée) et le publie sur la branche gh-pages, que GitHub Pages
# sert (build_type=legacy, source = gh-pages /). Remplace l'ancien flux
# actions/deploy-pages (resté bloqué "deployment_queued" sur ce repo).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # pour pousser sur la branche gh-pages via GITHUB_TOKEN
  pages: write      # pour relancer le build Pages en cas d'échec transitoire

concurrency:
  group: publish-ghpages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Construire le dossier publié (+ injecter la gate)
        env:
          SOS_GATE_SHA256: ${{ secrets.SOS_GATE_SHA256 }}
          SOS_GATE_CLIENT_SHA256: ${{ secrets.SOS_GATE_CLIENT_SHA256 }}   # mdp « client » (parcours formulaire seul — étude Unguess)
        run: |
          rm -rf _site && mkdir _site
          cp -r apps curated dist index.html _site/
          touch _site/.nojekyll                 # sert les fichiers tels quels (pas de Jekyll)
          node scripts/inject-gate.mjs _site      # surcouche mot de passe dans chaque .html

      - name: Publier sur la branche gh-pages
        run: |
          cd _site
          git init -q
          git checkout -q -b gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "deploy: ${GITHUB_SHA::8} (auto depuis main)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages

      - name: Vérifier le build Pages (relance auto si échec transitoire GitHub)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Le build interne "pages build and deployment" échoue parfois avec
          # "Deployment failed, try again later" (flake GitHub, surtout quand deux
          # déploiements se suivent de près). On surveille et on relance jusqu'à 3 fois.
          sleep 20
          for i in 1 2 3; do
            st=$(gh api "repos/${{ github.repository }}/pages/builds/latest" -q .status || echo unknown)
            echo "build Pages ($i): $st"
            [ "$st" = "built" ] && exit 0
            if [ "$st" = "errored" ]; then
              echo "→ relance du build Pages"
              gh api -X POST "repos/${{ github.repository }}/pages/builds" >/dev/null || true
            fi
            sleep 30
          done
          st=$(gh api "repos/${{ github.repository }}/pages/builds/latest" -q .status || echo unknown)
          if [ "$st" != "built" ]; then
            echo "::warning::build Pages toujours '$st' après relances — vérifier manuellement"
          fi

      - name: Récapitulatif
        run: echo "✅ Publié sur gh-pages → https://sncf-ia-innovation.github.io/SOS-Correspondance/"
