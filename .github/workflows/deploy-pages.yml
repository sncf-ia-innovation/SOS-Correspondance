name: Deploy to GitHub Pages

# Chemin "URL instantanée" : publie le site sur GitHub Pages (aucun compte AWS).
# Repo PRIVÉ → Pages nécessite un plan GitHub Team/Enterprise.
# Déclenché à la main par défaut ; décommenter `push` une fois Pages activé.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Injecter la surcouche mot de passe
        env:
          SOS_GATE_SHA256: ${{ secrets.SOS_GATE_SHA256 }}
        run: node scripts/inject-gate.mjs

      - name: Retirer les fichiers hors-site
        run: rm -rf .git .github scripts deploy node_modules

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1200000   # 20 min — le 1er provisioning Pages (repo récemment public) est lent
          error_count: 25
